name: Build happ-openwrt for OpenWrt 24.10.2

on:
  workflow_dispatch:

jobs:
  build:
    name: OpenWrt 24.10.2 mediatek/filogic
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            file \
            gawk \
            gettext \
            git \
            libncurses-dev \
            python3 \
            python3-dev \
            python3-setuptools \
            python3-pip \
            python3-wheel \
            python3-venv \
            python3-pyelftools \
            python3-cryptography \
            rsync \
            tar \
            unzip \
            wget \
            xz-utils \
            zstd \
            ca-certificates \
            asciidoc \
            binutils \
            bison \
            flex \
            libelf-dev \
            libfdt-dev \
            libssl-dev \
            libtool \
            patch \
            pkg-config \
            swig \
            time \
            zlib1g-dev

      - name: Build packages with OpenWrt SDK
        working-directory: happ-openwrt
        env:
          OPENWRT_VERSION: 24.10.2
          OPENWRT_TARGET: mediatek
          OPENWRT_SUBTARGET: filogic
          PACKAGE_ARCH: aarch64_cortex-a53
        run: bash scripts/build-openwrt-sdk.sh

      - name: Collect IPK files
        run: |
          mkdir -p artifacts
          find happ-openwrt -name "*happ*ipk" -type f -exec cp -v {} artifacts/ \;
          ls -lh artifacts

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: happ-openwrt-24.10.2-mediatek-filogic-aarch64_cortex-a53
          path: artifacts/*.ipk
          if-no-files-found: error
