name: Build happ-openwrt for OpenWrt 24.10.2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            curl \
            file \
            gawk \
            gettext \
            git \
            libncurses-dev \
            python3 \
            python3-dev \
            python3-setuptools \
            python3-pip \
            python3-wheel \
            python3-venv \
            python3-pyelftools \
            python3-cryptography \
            rsync \
            tar \
            unzip \
            wget \
            xz-utils \
            zstd \
            ca-certificates \
            asciidoc \
            binutils \
            bison \
            flex \
            libelf-dev \
            libfdt-dev \
            libssl-dev \
            libtool \
            patch \
            pkg-config \
            swig \
            time \
            zlib1g-dev

      - name: Build OpenWrt packages
        working-directory: happ-openwrt
        run: |
          OPENWRT_VERSION=24.10.2 \
          OPENWRT_TARGET=mediatek \
          OPENWRT_SUBTARGET=filogic \
          PACKAGE_ARCH=aarch64_cortex-a53 \
          bash scripts/build-openwrt-sdk.sh

      - name: Collect ipk files
        run: |
          mkdir -p artifacts
          find happ-openwrt -name "*happ*ipk" -type f -exec cp -v {} artifacts/ \;
          ls -lh artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: happ-openwrt-ipk
          path: artifacts/*.ipk
